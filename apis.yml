      data including Tomatometer scores, Audience scores, critic consensus, critic reviews,
      box office lists, in-theater listings, upcoming releases, DVD rental data, cast
      information, and movie search. The API is available to approved partners via the
      Fandango Developer Network and requires a paid license.
