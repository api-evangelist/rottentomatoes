aid: rottentomatoes
name: Rotten Tomatoes
description: >-
  Rotten Tomatoes is the leading movie and TV review aggregation platform, providing
  Tomatometer scores, Audience Scores, critic consensus summaries, and review snippets
  for movies and television shows. The Rotten Tomatoes API enables approved partners to
  access Tomatometer and Audience scores, critic and audience reviews, box office lists,
  movie details, cast information, DVD release data, and search capabilities. API access
  is managed through the Fandango Developer Network and requires an approved application
  and a paid license agreement starting at $60,000 annually.
